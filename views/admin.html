<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>短链管理</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.4rem; margin-bottom: 24px; }
    .form-row { display: flex; gap: 8px; margin-bottom: 24px; }
    .form-row input { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; }
    .form-row input[name="key"] { width: 110px; }
    .form-row input[name="name"] { width: 130px; }
    .form-row input[name="url"] { flex: 1; }
    button { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; white-space: nowrap; }
    .btn-add  { background: #2563eb; color: #fff; }
    .btn-edit { background: #f59e0b; color: #fff; font-size: 0.85rem; }
    .btn-save { background: #16a34a; color: #fff; font-size: 0.85rem; }
    .btn-cancel { background: #e5e7eb; color: #374151; font-size: 0.85rem; }
    .btn-del  { background: #ef4444; color: #fff; font-size: 0.85rem; }
    .action-group { display: flex; gap: 4px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #e5e7eb; }
    th { background: #f9fafb; font-size: 0.85rem; color: #6b7280; }
    td input { padding: 4px 8px; border: 1px solid #93c5fd; border-radius: 4px; width: 100%; box-sizing: border-box; font-size: 0.9rem; }
    #msg { margin-bottom: 12px; font-size: 0.9rem; }
    .err { color: #ef4444; }
    .ok  { color: #16a34a; }
  </style>
</head>
<body>
  <h1>短链管理</h1>
  <div id="msg"></div>
  <div class="form-row">
    <input name="key" placeholder="短码（不含/），如 1 或 abc" />
    <input name="name" placeholder="显示名称，如 百度" />
    <input name="url" placeholder="目标 URL，如 https://www.baidu.com" />
    <button class="btn-add" onclick="addLink()">添加</button>
  </div>
  <table>
    <thead>
      <tr><th>短码</th><th>显示名称</th><th>目标 URL</th><th>创建时间</th><th></th></tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    const msg = document.getElementById('msg');
    const tbody = document.getElementById('tbody');

    function showMsg(text, isErr) {
      msg.textContent = text;
      msg.className = isErr ? 'err' : 'ok';
      setTimeout(() => { msg.textContent = ''; }, 3000);
    }

    function renderRow(l) {
      const tr = document.createElement('tr');
      tr.dataset.key = l.key;

      // 短码
      const keyTd = document.createElement('td');
      const keyA = document.createElement('a');
      keyA.href = '/' + l.key;
      keyA.target = '_blank';
      keyA.textContent = '/' + l.key;
      keyTd.appendChild(keyA);

      // 显示名称（普通态）
      const nameTd = document.createElement('td');
      nameTd.textContent = l.name || '';

      // 目标 URL（普通态）
      const urlTd = document.createElement('td');
      const urlA = document.createElement('a');
      const safeUrl = /^https?:\/\//i.test(l.url) ? l.url : '#';
      urlA.href = safeUrl;
      urlA.target = '_blank';
      urlA.textContent = l.url;
      urlTd.appendChild(urlA);

      // 创建时间
      const timeTd = document.createElement('td');
      timeTd.textContent = new Date(l.created_at * 1000).toLocaleString('zh-CN');

      // 操作按钮
      const actionTd = document.createElement('td');
      const editBtn = document.createElement('button');
      editBtn.className = 'btn-edit';
      editBtn.textContent = '编辑';
      editBtn.addEventListener('click', () => enterEdit(tr, l));
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-del';
      delBtn.textContent = '删除';
      delBtn.addEventListener('click', () => deleteLink(l.key));
      const group = document.createElement('div');
      group.className = 'action-group';
      group.append(editBtn, delBtn);
      actionTd.appendChild(group);

      tr.append(keyTd, nameTd, urlTd, timeTd, actionTd);
      return tr;
    }

    function enterEdit(tr, l) {
      // 名称变输入框
      tr.cells[1].innerHTML = '';
      const nameInput = document.createElement('input');
      nameInput.value = l.name || '';
      nameInput.placeholder = '显示名称';
      tr.cells[1].appendChild(nameInput);

      // URL 变输入框
      tr.cells[2].innerHTML = '';
      const urlInput = document.createElement('input');
      urlInput.value = l.url;
      urlInput.placeholder = '目标 URL';
      tr.cells[2].appendChild(urlInput);

      // 操作换成保存/取消
      tr.cells[4].innerHTML = '';
      const saveBtn = document.createElement('button');
      saveBtn.className = 'btn-save';
      saveBtn.textContent = '保存';
      saveBtn.addEventListener('click', () => saveLink(tr, l.key, nameInput, urlInput));
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'btn-cancel';
      cancelBtn.textContent = '取消';
      cancelBtn.addEventListener('click', () => {
        tr.replaceWith(renderRow(l));
      });
      const group = document.createElement('div');
      group.className = 'action-group';
      group.append(saveBtn, cancelBtn);
      tr.cells[4].appendChild(group);

      nameInput.focus();
    }

    async function saveLink(tr, key, nameInput, urlInput) {
      const name = nameInput.value.trim();
      const url = urlInput.value.trim();
      if (!url) return showMsg('URL 不能为空', true);
      const res = await fetch(`/links/${encodeURIComponent(key)}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, url })
      });
      const data = await res.json();
      if (!res.ok) return showMsg(data.error, true);
      showMsg(`已更新 /${key}`, false);
      tr.replaceWith(renderRow({ ...data, created_at: data.created_at || Math.floor(Date.now()/1000) }));
      await loadLinks();
    }

    async function loadLinks() {
      try {
        const res = await fetch('/links');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const links = await res.json();
        tbody.innerHTML = '';
        links.forEach(l => tbody.appendChild(renderRow(l)));
      } catch (e) {
        showMsg('加载失败: ' + e.message, true);
      }
    }

    async function addLink() {
      const key = document.querySelector('input[name=key]').value.trim().replace(/^\/+/, '');
      const name = document.querySelector('input[name=name]').value.trim();
      const url = document.querySelector('input[name=url]').value.trim();
      if (!key || !url) return showMsg('请填写短码和目标 URL', true);
      const res = await fetch('/links', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key, name, url })
      });
      const data = await res.json();
      if (!res.ok) return showMsg(data.error, true);
      document.querySelector('input[name=key]').value = '';
      document.querySelector('input[name=name]').value = '';
      document.querySelector('input[name=url]').value = '';
      showMsg(`已添加 /${key}`, false);
      await loadLinks();
    }

    async function deleteLink(key) {
      if (!confirm(`确认删除 /${key}？`)) return;
      const res = await fetch(`/links/${encodeURIComponent(key)}`, { method: 'DELETE' });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        return showMsg(data.error || '删除失败', true);
      }
      showMsg(`已删除 /${key}`, false);
      await loadLinks();
    }

    loadLinks();
  </script>
</body>
</html>
