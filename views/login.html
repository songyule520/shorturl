<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 短链管理</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .box {
      background: #fff; border-radius: 14px; padding: 40px 36px;
      width: 360px; box-shadow: 0 24px 60px rgba(0,0,0,0.3);
    }
    .logo { font-size: 1.6rem; margin-bottom: 6px; }
    .title { font-size: 1.1rem; font-weight: 700; color: #111; margin-bottom: 4px; }
    .sub   { font-size: 0.85rem; color: #9ca3af; margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.82rem; color: #6b7280; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 10px 12px;
      border: 1px solid #d1d5db; border-radius: 8px;
      font-size: 0.95rem; outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #4f46e5; }
    .btn {
      width: 100%; padding: 11px;
      background: #4f46e5; color: #fff;
      border: none; border-radius: 8px;
      font-size: 0.95rem; font-weight: 600;
      cursor: pointer; margin-top: 8px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .err { color: #ef4444; font-size: 0.85rem; margin-top: 12px; text-align: center; min-height: 20px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">🔗</div>
    <div class="title">短链管理后台</div>
    <div class="sub">请登录后继续</div>
    <div class="field">
      <label>用户名</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username" />
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn" onclick="login()">登 录</button>
    <div class="err" id="err"></div>
  </div>

  <script>
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      document.getElementById('err').textContent = '';
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = '/manage';
      } else {
        document.getElementById('err').textContent = data.error || '登录失败';
      }
    }
  </script>
</body>
</html>
